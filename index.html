<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Master Implementation Timeline</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2128;
    --surface3: #21262d;
    --border: #30363d;
    --border2: #3d444d;
    --text: #e6edf3;
    --text2: #8b949e;
    --text3: #6e7681;
    --accent: #58a6ff;

    --phase-dev:      #1f6feb; --phase-dev-bg:    #0d1117; --phase-dev-light: #112240;
    --phase-config:   #8957e5; --phase-config-bg: #0d1117; --phase-config-light: #1e1030;
    --phase-sit:      #388bfd; --phase-sit-bg:    #0d1117; --phase-sit-light: #0e2044;
    --phase-uat:      #f78166; --phase-uat-bg:    #0d1117; --phase-uat-light: #2d1a17;
    --phase-bal:      #3fb950; --phase-bal-bg:    #0d1117; --phase-bal-light: #0d2b14;
    --phase-cut:      #e3b341; --phase-cut-bg:    #0d1117; --phase-cut-light: #2e2208;
    --phase-golive:   #39d353; --phase-golive-bg: #0d1117; --phase-golive-light: #0d2b14;

    --st-sched:   #388bfd; --st-sched-bg:   #0c2d6b;
    --st-ready:   #3fb950; --st-ready-bg:   #0d2b14;
    --st-review:  #e3b341; --st-review-bg:  #2e2208;
    --st-risk:    #f85149; --st-risk-bg:    #3a0f0d;
    --st-tbd:     #8b949e; --st-tbd-bg:     #21262d;
    --st-mile:    #d2a8ff; --st-mile-bg:    #2a1f45;

    --flag-risk:    #f85149;
    --flag-added:   #3fb950;
    --flag-revised: #58a6ff;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
  }

  /* ── HEADER ── */
  .site-header {
    background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #0d1117 100%);
    border-bottom: 1px solid var(--border);
    padding: 2rem 2rem 1.5rem;
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(12px);
  }
  .header-inner { max-width: 1400px; margin: 0 auto; }
  .header-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
  .header-title { font-size: 1.25rem; font-weight: 700; color: var(--text); letter-spacing: -0.02em; }
  .header-title span { color: var(--accent); }
  .header-sub { font-size: 0.75rem; color: var(--text3); margin-top: 0.25rem; font-family: 'JetBrains Mono', monospace; }
  .golive-badge {
    display: inline-flex; align-items: center; gap: 0.4rem;
    background: #0d2b14; border: 1px solid #3fb950;
    color: #3fb950; font-size: 0.72rem; font-weight: 600;
    padding: 0.35rem 0.75rem; border-radius: 20px;
    letter-spacing: 0.03em; white-space: nowrap;
  }
  .golive-badge::before { content: "●"; font-size: 0.6rem; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── STATS BAR ── */
  .stats-bar {
    display: flex; gap: 1rem; margin-top: 1rem; flex-wrap: wrap;
  }
  .stat {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.5rem 1rem;
    display: flex; align-items: center; gap: 0.5rem;
    font-size: 0.78rem;
  }
  .stat-num { font-size: 1.1rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .stat-label { color: var(--text2); }
  .stat.risk .stat-num { color: var(--flag-risk); }
  .stat.mile .stat-num { color: var(--st-mile); }
  .stat.total .stat-num { color: var(--accent); }
  .stat.added .stat-num { color: var(--flag-added); }

  /* ── FILTERS ── */
  .filters {
    display: flex; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap; align-items: center;
  }
  .filters label { font-size: 0.72rem; color: var(--text3); margin-right: 0.25rem; }
  .filter-btn {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text2); font-size: 0.72rem; font-weight: 500;
    padding: 0.3rem 0.7rem; border-radius: 20px; cursor: pointer;
    transition: all 0.15s; white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--border2); color: var(--text); }
  .filter-btn.active { border-color: var(--accent); color: var(--accent); background: #0c2450; }
  .search-box {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-size: 0.78rem; font-family: 'Inter', sans-serif;
    padding: 0.3rem 0.75rem; border-radius: 20px; outline: none;
    width: 200px; transition: border-color 0.15s;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--text3); }

  /* ── MAIN ── */
  .main { max-width: 1400px; margin: 0 auto; padding: 1.5rem 2rem 4rem; }

  /* ── PHASE SECTION ── */
  .phase-section { margin-bottom: 1rem; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
  .phase-header {
    display: flex; align-items: center; gap: 0.75rem;
    padding: 0.75rem 1rem; cursor: pointer; user-select: none;
    transition: background 0.15s;
  }
  .phase-header:hover { filter: brightness(1.1); }
  .phase-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .phase-name { font-size: 0.85rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
  .phase-count { font-size: 0.72rem; margin-left: auto; opacity: 0.7; font-family: 'JetBrains Mono', monospace; }
  .phase-chevron { font-size: 0.7rem; transition: transform 0.2s; opacity: 0.6; }
  .phase-section.collapsed .phase-chevron { transform: rotate(-90deg); }
  .phase-section.collapsed .phase-body { display: none; }

  /* ── TABLE ── */
  .phase-body { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.8rem; min-width: 900px; }
  thead th {
    background: var(--surface3); color: var(--text3);
    font-size: 0.68rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em;
    padding: 0.5rem 0.75rem; text-align: left; border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  thead th:nth-child(1) { width: 60px; }
  thead th:nth-child(3) { width: 110px; }
  thead th:nth-child(4) { width: 120px; }
  thead th:nth-child(5) { width: 75px; }
  thead th:nth-child(6) { width: 120px; }
  thead th:nth-child(7) { width: 90px; }
  thead th:nth-child(8) { width: 100px; }

  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface3) !important; }
  tbody tr.hidden-row { display: none; }

  td { padding: 0.55rem 0.75rem; vertical-align: top; }
  td.ref { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--text3); white-space: nowrap; }
  td.task { font-weight: 500; color: var(--text); }
  td.task.is-milestone { font-weight: 600; }
  td.date { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; white-space: nowrap; }
  td.month { font-size: 0.72rem; color: var(--text3); white-space: nowrap; font-family: 'JetBrains Mono', monospace; }
  td.owner { font-size: 0.75rem; color: var(--text2); }
  td.pred { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--text3); }
  td.notes { font-size: 0.75rem; color: var(--text2); line-height: 1.4; }

  .status-badge {
    display: inline-block; font-size: 0.68rem; font-weight: 600;
    padding: 0.2rem 0.55rem; border-radius: 20px; white-space: nowrap;
    letter-spacing: 0.02em;
  }
  .pm-flag {
    display: inline-block; font-size: 0.68rem; font-weight: 600;
    padding: 0.18rem 0.5rem; border-radius: 4px; white-space: nowrap;
  }
  .flag-risk    { background: #3a0f0d; color: #f85149; }
  .flag-added   { background: #0d2b14; color: #3fb950; }
  .flag-revised { background: #0c2450; color: #58a6ff; }

  .milestone-row td.task::before {
    content: "◆ "; font-size: 0.6rem; color: var(--st-mile); vertical-align: middle;
  }

  /* ── RISK REGISTER ── */
  .risk-section {
    margin-top: 2rem; border: 1px solid #f85149; border-radius: 12px; overflow: hidden;
  }
  .risk-header {
    background: #1a0a09; padding: 0.75rem 1rem;
    display: flex; align-items: center; gap: 0.6rem; cursor: pointer;
  }
  .risk-header-title { font-size: 0.85rem; font-weight: 700; color: #f85149; text-transform: uppercase; letter-spacing: 0.05em; }
  .risk-header-sub { font-size: 0.72rem; color: var(--text3); margin-left: auto; }
  .risk-body { overflow-x: auto; }
  .risk-table { width: 100%; border-collapse: collapse; font-size: 0.78rem; min-width: 700px; }
  .risk-table thead th {
    background: #160908; color: #8b949e; font-size: 0.68rem;
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em;
    padding: 0.5rem 0.75rem; text-align: left; border-bottom: 1px solid #3a1c1a;
  }
  .risk-table tbody tr { border-bottom: 1px solid #1e1010; transition: background 0.1s; }
  .risk-table tbody tr:hover { background: #1a0d0c !important; }
  .risk-table td { padding: 0.6rem 0.75rem; vertical-align: top; color: var(--text2); line-height: 1.4; }
  .risk-id { font-family: 'JetBrains Mono', monospace; font-weight: 600; color: var(--text3); }
  .priority-high { background: #3a0f0d; color: #f85149; font-size: 0.68rem; font-weight: 700; padding: 0.2rem 0.55rem; border-radius: 20px; }
  .priority-med  { background: #2e2208; color: #e3b341; font-size: 0.68rem; font-weight: 700; padding: 0.2rem 0.55rem; border-radius: 20px; }
  .risk-area { font-weight: 600; color: var(--text); }
  .risk-issue { color: var(--text2); }
  .risk-action { color: var(--text2); }

  /* ── LEGEND ── */
  .legend-bar {
    margin-top: 2rem; padding: 1rem 1.25rem;
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    display: flex; gap: 1.5rem; flex-wrap: wrap; align-items: center;
  }
  .legend-label { font-size: 0.7rem; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
  .legend-item { display: flex; align-items: center; gap: 0.35rem; font-size: 0.72rem; color: var(--text2); }

  /* ── PRINT ── */
  @media print {
    body { background: #fff; color: #000; }
    .site-header { position: static; }
    .filters, .filter-btn, .search-box { display: none; }
    .phase-section.collapsed .phase-body { display: block !important; }
  }

  @media (max-width: 768px) {
    .main { padding: 1rem; }
    .site-header { padding: 1rem; }
  }
</style>
</head>

</header>

    ['6.5','SYSTEM FREEZE: Halt new development & change requests','28/09/2026','Milestone',"Sep '26",'PM','6.4','→ REVISED','No code changes, configuration changes or master data updates after this point'],
    ['6.6','Lock Cutover Date & Notify all Stakeholders','28/09/2026','Scheduled',"Sep '26",'PM','6.5','→ REVISED','Formally communicate Go Live date to all schools, staff and stakeholders'],
    ['6.7','Final Data Migration to Production','01/10/2026','Milestone',"Oct '26",'Data Team','6.5','→ REVISED','Execute final production migration using signed-off scripts — include balances'],
    ['6.8','Final Reconciliation & Data Validation in Production','02/10/2026','Scheduled',"Oct '26",'Data + Finance','6.7','✓ ADDED','Verify all counts, totals and spot-checks against source system'],
    ['6.9','Conduct Go-Live Readiness Review','03/10/2026','Milestone',"Oct '26",'PM / Client','6.8','→ REVISED','Final checkpoint: all systems go, support teams briefed, helpdesk ready'],
  ],
  golive: [
    ['7.1','GO LIVE — Enable Production Environment','05/10/2026','Milestone',"Oct '26",'Tech Lead + PM','6.9','→ REVISED','Target Go Live date — subject to go/no-go approval. Switch off Paradigm simultaneously'],
    ['7.2','Switch off Legacy System (Paradigm)','05/10/2026','Milestone',"Oct '26",'Tech Lead','7.1','→ REVISED','Decommission Paradigm access — retain read-only for 30 days for reference'],
    ['7.3','Hypercare Support — Week 1 (On-site)','05/10/2026','Scheduled',"Oct '26",'Functional + Dev','7.1','✓ ADDED','All functional and dev leads on-site or on-call for first week'],
    ['7.4','Hypercare Support — Week 2 & 3 (Remote)','12/10/2026','Scheduled',"Oct '26",'Functional Team','7.3','✓ ADDED','Daily check-in calls, issue triage, priority fixes'],
    ['7.5','Monitor System Performance & Stability','05/10/2026','Scheduled',"Oct '26",'Tech Lead','7.1','→ REVISED','Daily monitoring for first 4 weeks: performance, errors, data integrity'],
    ['7.6','Post Go-Live Issue Log Review','19/10/2026','Scheduled',"Oct '26",'PM','7.4','✓ ADDED','Review all issues raised during hypercare — classify as bugs vs change requests'],
    ['7.7','Project Closure & Final Sign-off','31/10/2026','Milestone',"Oct '26",'PM / Client','7.6','→ REVISED','Lessons learned, handover to BAU support, closure report, final invoice'],
    ['7.8','Post Go-Live Support Ends / BAU Handover','31/10/2026','Milestone',"Oct '26",'PM','7.7','✓ ADDED','Formal transition to Business As Usual support model'],
  ],
};

const RISKS = [
  ['R1','Transportation & SMS Module','No blueprint / date agreed','HIGH','Escalate to BSS MENA immediately. Resolve by 30 Jun or descope to Phase 2.'],
  ['R2','Gradebook (31 Aug dev completion)','Pushes Go Live to Nov at earliest','HIGH','Consider expediting dev team, parallel-running UAT, or releasing Gradebook post-Go Live as Phase 2.'],
  ['R3','Library blueprint pending','Dev cannot start without blueprint','MED','BT to submit blueprint to BSS MENA by 19 Jun. Escalate if not received.'],
  ['R4','Fixed Assets requirements under review','Date at risk','MED','Requirements must be finalised by 29 Jun to protect 20 Jul dev completion date.'],
  ['R5','No SIT phase in original plan','Integration issues would surface in UAT','HIGH','SIT phase added (Phase 3). Confirm QA resource availability from 28 Jul.'],
  ['R6','Balance migration dates were incorrect','Original plan showed 30 Jun — pre-config','HIGH',"Corrected: balance migration executes post-UAT sign-off (Sep). '30 Jun' is the snapshot date only."],
  ['R7','Go Live date dependency on Gradebook','If Gradebook not expedited, Go Live slips','HIGH','Recommend Go Live without Gradebook (Phase 2 release). Decision needed from steering committee.'],
];

let currentFilter = 'all';
let currentSearch = '';

function statusBadge(s) {
  const st = STATUS_STYLE[s] || {bg:'#21262d',fg:'#8b949e'};
  return `<span class="status-badge" style="background:${st.bg};color:${st.fg}">${s}</span>`;
}
function pmFlag(f) {
  if (!f) return '';
  const cls = FLAG_CLASS[f] || '';
  return `<span class="pm-flag ${cls}">${f}</span>`;
}

function buildStats() {
  let total=0, milestones=0, risks=0, added=0;
  Object.values(DATA).forEach(rows => rows.forEach(r => {
    total++;
    if(r[3]==='Milestone') milestones++;
    if(r[3]==='At Risk') risks++;
    if(r[7]==='✓ ADDED') added++;
  }));
  const bar = document.getElementById('statsBar');
  bar.innerHTML = `
    <div class="stat total"><span class="stat-num">${total}</span><span class="stat-label">total tasks</span></div>
    <div class="stat mile"><span class="stat-num">${milestones}</span><span class="stat-label">milestones</span></div>
    <div class="stat risk"><span class="stat-num">${risks}</span><span class="stat-label">at risk</span></div>
    <div class="stat added"><span class="stat-num">${added}</span><span class="stat-label">PM additions</span></div>
    <div class="stat"><span class="stat-num" style="color:#e3b341">7</span><span class="stat-label">phases</span></div>
  `;
}

function buildPhases() {
  const main = document.getElementById('mainContent');
  main.innerHTML = '';

  PHASES.forEach(phase => {
    const rows = DATA[phase.id] || [];
    const section = document.createElement('div');
    section.className = 'phase-section';
    section.id = 'phase-' + phase.id;
    section.style.borderColor = phase.color + '40';

    const visibleCount = rows.length;
    section.innerHTML = `
      <div class="phase-header" style="background:${phase.bg}" onclick="togglePhase('${phase.id}')">
        <div class="phase-dot" style="background:${phase.color}"></div>
        <span class="phase-name" style="color:${phase.color}">${phase.label}</span>
        <span class="phase-count" style="color:${phase.color}">${visibleCount} tasks</span>
        <span class="phase-chevron" style="color:${phase.color}">▼</span>
      </div>
      <div class="phase-body">
        <table>
          <thead>
            <tr>
              <th>Ref</th><th>Task / Milestone</th><th>Target Date</th>
              <th>Status</th><th>Month</th><th>Owner</th>
              <th>Predecessor</th><th>PM Review</th><th>Notes</th>
            </tr>
          </thead>
          <tbody id="tbody-${phase.id}">
          </tbody>
        </table>
      </div>`;
    main.appendChild(section);

    const tbody = document.getElementById('tbody-' + phase.id);
    rows.forEach((r, i) => {
      const [ref, task, date, status, month, owner, pred, flag, notes] = r;
      const isMile = status === 'Milestone';
      const rowBg = i % 2 === 0 ? 'var(--surface)' : 'var(--surface2)';
      const tr = document.createElement('tr');
      tr.dataset.status = status;
      tr.dataset.flag = flag || '';
      tr.dataset.text = (ref+task+owner+notes).toLowerCase();
      if(isMile) tr.classList.add('milestone-row');
      tr.style.background = rowBg;
      tr.innerHTML = `
        <td class="ref">${ref}</td>
        <td class="task${isMile?' is-milestone':''}">${task}</td>
        <td class="date">${date}</td>
        <td>${statusBadge(status)}</td>
        <td class="month">${month}</td>
        <td class="owner">${owner}</td>
        <td class="pred">${pred}</td>
        <td>${pmFlag(flag)}</td>
        <td class="notes">${notes}</td>`;
      tbody.appendChild(tr);
    });
  });

  // Risk register
  const riskSec = document.createElement('div');
  riskSec.className = 'risk-section';
  riskSec.innerHTML = `
    <div class="risk-header" onclick="toggleRisk()">
      <span style="color:#f85149;font-size:1rem;">⚠</span>
      <span class="risk-header-title">PM Risk Register</span>
      <span class="risk-header-sub">${RISKS.length} risks identified — immediate action required</span>
      <span class="phase-chevron" id="riskChevron" style="color:#f85149;margin-left:0.5rem;">▼</span>
    </div>
    <div class="risk-body" id="riskBody">
      <table class="risk-table">
        <thead><tr><th>ID</th><th>Area</th><th>Issue</th><th>Priority</th><th>Recommended Action</th></tr></thead>
        <tbody>
          ${RISKS.map((r,i)=>`
          <tr style="background:${i%2===0?'#0d0706':'#100908'}">
            <td class="risk-id">${r[0]}</td>
            <td class="risk-area">${r[1]}</td>
            <td class="risk-issue">${r[2]}</td>
            <td><span class="${r[3]==='HIGH'?'priority-high':'priority-med'}">${r[3]}</span></td>
            <td class="risk-action">${r[4]}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
  main.appendChild(riskSec);

  // Legend
  const legend = document.createElement('div');
  legend.className = 'legend-bar';
  legend.innerHTML = `
    <span class="legend-label">PM Review:</span>
    <span class="legend-item"><span class="pm-flag flag-risk">⚠ RISK</span> Risk identified</span>
    <span class="legend-item"><span class="pm-flag flag-added">✓ ADDED</span> New task added by PM</span>
    <span class="legend-item"><span class="pm-flag flag-revised">→ REVISED</span> Date/detail revised</span>
    <span class="legend-label" style="margin-left:1rem">Status:</span>
    ${Object.entries(STATUS_STYLE).map(([k,v])=>`<span class="legend-item"><span class="status-badge" style="background:${v.bg};color:${v.fg}">${k}</span></span>`).join('')}
  `;
  main.appendChild(legend);
}

function togglePhase(id) {
  const sec = document.getElementById('phase-' + id);
  sec.classList.toggle('collapsed');
}

function toggleRisk() {
  const body = document.getElementById('riskBody');
  const chev = document.getElementById('riskChevron');
  const hidden = body.style.display === 'none';
  body.style.display = hidden ? '' : 'none';
  chev.style.transform = hidden ? '' : 'rotate(-90deg)';
}

function filterStatus(status, btn) {
  currentFilter = status;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function searchTasks(val) {
  currentSearch = val.toLowerCase();
  applyFilters();
}

function applyFilters() {
  document.querySelectorAll('tbody tr').forEach(tr => {
    const matchStatus = currentFilter === 'all'
      || tr.dataset.status === currentFilter
      || (currentFilter === '⚠ RISK' && tr.dataset.flag === '⚠ RISK');
    const matchSearch = !currentSearch || tr.dataset.text.includes(currentSearch);
    tr.classList.toggle('hidden-row', !(matchStatus && matchSearch));
  });
  // update counts
  PHASES.forEach(phase => {
    const tbody = document.getElementById('tbody-' + phase.id);
    if (!tbody) return;
    const visible = tbody.querySelectorAll('tr:not(.hidden-row)').length;
    const countEl = document.querySelector(`#phase-${phase.id} .phase-count`);
    if (countEl) countEl.textContent = visible + ' tasks';
    const sec = document.getElementById('phase-' + phase.id);
    if (sec) sec.style.display = visible === 0 ? 'none' : '';
  });
}

buildStats();
buildPhases();
</script>
</body>
</html>
